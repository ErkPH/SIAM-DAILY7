<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SIAM - Student Experience Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #020617; }
        .lux-card { background: white; border: 1px solid rgba(0,0,0,0.05); border-radius: 2rem; transition: all 0.3s; }
        .input-premium { background: #f1f5f9; border-radius: 1.2rem; border: 2px solid transparent; outline: none; }
        .input-premium:focus { border-color: #fbbf24; background: white; }
    </style>
</head>
<body class="min-h-screen pb-20">
    <nav class="bg-white/80 backdrop-blur-xl border-b sticky top-0 z-50 px-10 py-6 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-slate-950 rounded-2xl flex items-center justify-center text-amber-400 font-black italic shadow-lg">S</div>
            <span class="text-xl font-black tracking-tighter uppercase text-slate-950 font-bold">SIAM<span class="text-amber-400">.</span></span>
        </div>
        <button id="btnLogout" class="bg-slate-900 text-white px-6 py-2 rounded-full text-[10px] font-black uppercase hover:bg-red-500 transition-all">Logout</button>
    </nav>

    <main class="max-w-7xl mx-auto pt-12 px-6">
        <section class="mb-16">
            <div class="lux-card p-8 shadow-xl border-t-4 border-t-slate-900">
                <h2 class="text-xl font-black italic mb-6">Create New Aspiration</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="md:col-span-2"><input type="text" id="isiAspirasi" class="w-full p-4 input-premium font-bold" placeholder="Ketik aspirasimu di sini..."></div>
                    <div><select id="kategori" class="w-full p-4 input-premium font-black text-slate-500 uppercase text-[10px]"><option value="Akademik">AKADEMIK</option><option value="Fasilitas">FASILITAS</option></select></div>
                    <button id="btnKirim" class="bg-slate-900 text-amber-400 p-4 rounded-2xl font-black text-[10px] uppercase hover:bg-amber-400 hover:text-slate-950 transition-all active:scale-95">Submit</button>
                </div>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
            <section>
                <h3 class="text-xs font-black text-slate-900 uppercase tracking-[0.3em] mb-6 px-4">Personal Tracker (My Posts)</h3>
                <div id="myAspirations" class="space-y-4"></div>
            </section>
            <section>
                <h3 class="text-xs font-black text-slate-900 uppercase tracking-[0.3em] mb-6 px-4">Explore Feed (Vote Others)</h3>
                <div id="publicAspirations" class="space-y-4"></div>
            </section>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, increment, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDrc8_w2ptm-hq-EShTZolqxDARSsz9Kbc", authDomain: "siam-kampus.firebaseapp.com", projectId: "siam-kampus", storageBucket: "siam-kampus.firebasestorage.app", messagingSenderId: "973898695715", appId: "1:973898695715:web:c7be91360a49928494dd96" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUserEmail = "";
        onAuthStateChanged(auth, u => { 
            if(!u || !u.email.includes('student')) window.location.href="index.html"; 
            else { currentUserEmail = u.email; initData(); }
        });

        document.getElementById('btnKirim').addEventListener('click', async () => {
            const teks = document.getElementById('isiAspirasi').value;
            if(!teks.trim()) return;
            await addDoc(collection(db, "aspirasi"), { 
                deskripsi: teks, kategori: document.getElementById('kategori').value, 
                status: "Dikirim", vote_count: 0, owner: currentUserEmail, tanggal: new Date() 
            });
            document.getElementById('isiAspirasi').value = "";
        });

        function initData() {
            onSnapshot(query(collection(db, "aspirasi"), where("owner", "==", currentUserEmail)), snap => {
                const area = document.getElementById('myAspirations'); area.innerHTML = "";
                snap.forEach(d => {
                    const item = d.data();
                    const isSelesai = item.status === "Selesai";
                    area.innerHTML += `
                        <div class="lux-card p-6 border-l-4 ${isSelesai ? 'border-amber-400' : 'border-slate-900'}">
                            <div class="flex justify-between mb-2 font-black text-[8px] uppercase">
                                <span class="bg-slate-100 px-2 py-1 rounded">${item.status}</span>
                                <span class="text-slate-300">ID: ${d.id.substring(0,6)}</span>
                            </div>
                            <p class="text-sm font-bold text-slate-800 mb-4">${item.deskripsi}</p>
                            ${isSelesai && !item.rating ? `
                                <div class="pt-4 border-t border-slate-100 flex gap-2">
                                    <select id="rate-${d.id}" class="flex-1 text-[10px] font-black p-2 bg-slate-900 text-amber-400 rounded-lg outline-none">
                                        <option value="5">★ ★ ★ ★ ★</option><option value="4">★ ★ ★ ★</option><option value="3">★ ★ ★</option><option value="2">★ ★</option><option value="1">★</option>
                                    </select>
                                    <button onclick="submitRating('${d.id}')" class="bg-amber-400 text-slate-950 px-4 py-2 rounded-lg text-[9px] font-black uppercase">Rate</button>
                                </div>
                            ` : item.rating ? `<p class="text-[9px] font-black text-amber-500 uppercase italic">✓ Rated: ${item.rating} Stars</p>` : ''}
                        </div>`;
                });
            });

            onSnapshot(query(collection(db, "aspirasi"), where("owner", "!=", currentUserEmail), orderBy("owner"), orderBy("vote_count", "desc")), snap => {
                const area = document.getElementById('publicAspirations'); area.innerHTML = "";
                snap.forEach(d => {
                    const item = d.data();
                    area.innerHTML += `
                        <div class="lux-card p-6 flex justify-between items-center bg-slate-50/50">
                            <div class="max-w-[70%]">
                                <span class="text-[8px] font-black text-slate-400 uppercase mb-1 block">${item.kategori}</span>
                                <p class="text-sm font-bold text-slate-700">${item.deskripsi}</p>
                            </div>
                            <button onclick="vote('${d.id}')" class="bg-white border-2 border-slate-900 text-slate-900 px-5 py-2 rounded-xl text-[10px] font-black hover:bg-slate-900 hover:text-amber-400 transition-all active:scale-125">▲ ${item.vote_count}</button>
                        </div>`;
                });
            });
        }

        window.vote = id => updateDoc(doc(db, "aspirasi", id), { vote_count: increment(1) });
        window.submitRating = async (id) => {
            const r = document.getElementById(`rate-${id}`).value;
            await updateDoc(doc(db, "aspirasi", id), { rating: Number(r) });
            alert("Rating tersimpan!");
        };
        document.getElementById('btnLogout').addEventListener('click', () => signOut(auth));
    </script>
</body>
</html>
