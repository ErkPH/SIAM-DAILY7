<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SIAM - Institutional Excellence Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; overflow-x: hidden; }
        .glass-nav { background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .lux-card { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.05); transition: all 0.4s ease; }
        .filter-btn.active { background: #fbbf24; color: #020617; border-color: #fbbf24; }
    </style>
</head>
<body class="min-h-screen">
    <nav class="glass-nav sticky top-0 z-[100] px-10 py-6 flex justify-between items-center text-white">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-amber-400 rounded-2xl flex items-center justify-center text-slate-950 font-black italic shadow-lg shadow-amber-400/20">S</div>
            <span class="text-2xl font-black tracking-tighter uppercase">SIAM<span class="text-amber-400">.</span></span>
        </div>
        <button onclick="toggleModal('loginModal')" class="bg-white text-slate-950 px-8 py-3 rounded-full text-[10px] font-black uppercase tracking-widest hover:bg-amber-400 transition-all shadow-xl">LOGIN</button>
    </nav>

    <header class="max-w-5xl mx-auto pt-32 pb-16 px-6 text-center">
        <h1 class="text-7xl font-black tracking-tighter mb-6 bg-gradient-to-b from-white to-slate-500 bg-clip-text text-transparent leading-[1.1]">Suara Mahasiswa,<br>Transformasi Kampus.</h1>
        <p class="text-slate-500 text-lg max-w-2xl mx-auto font-medium">Platform Transparansi Aspirasi Universitas Muhammadiyah Malang.</p>
    </header>

    <main class="max-w-4xl mx-auto py-10 px-6">
        <div class="flex flex-col gap-6 mb-12 border-b border-white/5 pb-8">
            <input type="text" id="searchInput" onkeyup="searchAspirasi()" placeholder="Cari aspirasi (AC, Kantin, Parkir...)" 
                class="w-full bg-white/5 border border-white/10 text-white text-xs font-bold p-4 px-6 rounded-2xl outline-none focus:border-amber-400 transition-all">
            
            <div class="flex flex-col md:flex-row items-center justify-between gap-6">
                <div class="flex gap-2">
                    <button onclick="setFilter('All')" id="btnAll" class="filter-btn active px-4 py-2 rounded-xl border border-white/10 text-[9px] font-black uppercase transition-all">Semua</button>
                    <button onclick="setFilter('Akademik')" id="btnAkademik" class="filter-btn px-4 py-2 rounded-xl border border-white/10 text-[9px] font-black uppercase transition-all">Akademik</button>
                    <button onclick="setFilter('Fasilitas')" id="btnFasilitas" class="filter-btn px-4 py-2 rounded-xl border border-white/10 text-[9px] font-black uppercase transition-all">Fasilitas</button>
                </div>
                <select id="sortOrder" onchange="applyFilters()" class="bg-white/5 border border-white/10 text-white text-[9px] font-black uppercase p-3 px-6 rounded-xl outline-none cursor-pointer hover:border-amber-400">
                    <option value="vote_count" class="bg-slate-950">🔥 Terpopuler</option>
                    <option value="tanggal" class="bg-slate-950">🕒 Terbaru</option>
                </select>
            </div>
        </div>

        <div id="publicFeed" class="grid gap-6"></div>
    </main>

    <div id="loginModal" class="fixed inset-0 bg-slate-950/95 backdrop-blur-3xl z-[200] hidden flex items-center justify-center p-6 text-white text-center">
        <div class="bg-slate-900 w-full max-w-sm p-12 rounded-[3.5rem] border border-white/5 shadow-2xl relative">
            <button onclick="toggleModal('loginModal')" class="absolute top-8 right-8 text-slate-500 hover:text-white text-2xl font-light">&times;</button>
            <h4 class="text-2xl font-black italic text-center mb-8 underline decoration-amber-400">Authentication</h4>
            <div class="space-y-4">
                <input type="email" id="email" class="w-full p-5 bg-white/5 border border-white/5 rounded-2xl outline-none text-white text-sm" placeholder="Email">
                <input type="password" id="pass" class="w-full p-5 bg-white/5 border border-white/5 rounded-2xl outline-none text-white text-sm" placeholder="Password">
                <button id="btnLogin" class="w-full bg-amber-400 text-slate-950 py-5 rounded-2xl font-black uppercase text-[10px] tracking-widest hover:bg-amber-300">Authorize Access</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, where, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDrc8_w2ptm-hq-EShTZolqxDARSsz9Kbc", authDomain: "siam-kampus.firebaseapp.com", projectId: "siam-kampus", storageBucket: "siam-kampus.firebasestorage.app", messagingSenderId: "973898695715", appId: "1:973898695715:web:c7be91360a49928494dd96" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.toggleModal = (id) => document.getElementById(id).classList.toggle('hidden');

        let currentFilter = "All";
        window.applyFilters = () => loadPublicAspirasi(currentFilter, document.getElementById('sortOrder').value);
        window.setFilter = (v) => {
            currentFilter = v;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn' + v).classList.add('active');
            applyFilters();
        };

        function loadPublicAspirasi(filter, sortBy) {
            const feed = document.getElementById('publicFeed');
            let q = filter === "All" ? query(collection(db, "aspirasi"), orderBy(sortBy, "desc"), limit(15)) : query(collection(db, "aspirasi"), where("kategori", "==", filter), orderBy(sortBy, "desc"), limit(15));
            
            onSnapshot(q, snap => {
                feed.innerHTML = "";
                snap.forEach(d => {
                    const item = d.data();
                    let formatLog = "Baru saja";
                    if (item.tanggal) {
                        const tgl = item.tanggal.toDate ? item.tanggal.toDate() : new Date(item.tanggal);
                        formatLog = tgl.toLocaleDateString('id-ID', { day: 'numeric', month: 'short' }) + " | " + tgl.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
                    }
                    const feedback = item.feedback_staff ? item.feedback_staff : "";
                    
                    feed.innerHTML += `
                        <div class="lux-card p-10 rounded-[2.5rem] flex justify-between items-start shadow-2xl mb-4">
                            <div class="max-w-xl text-left">
                                <div class="flex gap-2 mb-4 text-[8px] font-black uppercase">
                                    <span class="text-amber-400 bg-amber-400/10 px-3 py-1 rounded-full">${item.kategori}</span>
                                    <span class="text-slate-500 bg-white/5 px-3 py-1 rounded-full">${item.status}</span>
                                </div>
                                <p class="text-xl font-bold text-white leading-snug">${item.deskripsi}</p>
                                ${feedback ? `<div class="mt-5 p-5 bg-white/5 border-l-4 border-amber-400 rounded-r-2xl text-[13px] italic text-slate-300">"${feedback}"</div>` : ''}
                                <p class="text-[9px] text-slate-600 mt-6 font-black uppercase tracking-widest italic tracking-[0.2em]">LOG: ${formatLog}</p>
                            </div>
                            <div class="bg-white/5 px-6 py-4 rounded-3xl text-center border border-white/10 shrink-0 ml-4">
                                <span class="block text-sm font-black text-white italic">VOTES</span>
                                <span class="text-xl font-black text-amber-400">${item.vote_count || 0}</span>
                            </div>
                        </div>`;
                });
            });
        }

        window.searchAspirasi = () => {
            const input = document.getElementById("searchInput").value.toLowerCase();
            const cards = document.getElementsByClassName("lux-card");
            for (let i = 0; i < cards.length; i++) {
                const text = cards[i].getElementsByTagName("p")[0].innerText.toLowerCase();
                cards[i].style.display = text.includes(input) ? "flex" : "none";
            }
        };

        document.getElementById('btnLogin').addEventListener('click', async () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            try {
                await signInWithEmailAndPassword(auth, e, p);
                window.location.href = e.includes('student') ? "aspirasi.html" : "dashboard.html";
            } catch (err) { alert("LOGIN ERROR: Periksa email institutional anda."); }
        });

        applyFilters();
    </script>
</body>
</html>
