<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SIAM - Management Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; }
        .lux-card { background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255,255,255,0.05); border-radius: 2.5rem; }
        @media print { .no-print { display: none; } .lux-card { background: white !important; color: black !important; border: 1px solid black; } }
    </style>
</head>
<body class="min-h-screen p-10">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-12 no-print">
            <h1 class="text-4xl font-black italic tracking-tighter uppercase"><span id="roleLabel" class="text-amber-400">Loading</span> Dashboard.</h1>
            <button id="btnLogout" class="bg-white text-slate-900 px-8 py-2 rounded-full text-[10px] font-black uppercase">LOGOUT</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12 no-print">
            <div class="lux-card p-8 col-span-2 flex items-center gap-4">
                <input type="text" id="adminSearch" onkeyup="searchAdmin()" placeholder="Cari isi aspirasi..." class="flex-1 bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-xs focus:border-amber-400">
                <button onclick="window.print()" class="bg-amber-400 text-slate-950 px-6 py-4 rounded-2xl font-black text-[10px] uppercase">Export Report</button>
            </div>
            <div class="lux-card p-8 flex flex-col justify-center items-center"><p id="totalCount" class="text-5xl font-black text-amber-400">0</p><p class="text-[9px] font-black uppercase mt-2">Total Aspirasi</p></div>
        </div>

        <div class="lux-card p-10 mb-12 no-print"><canvas id="statusChart" height="100"></canvas></div>

        <div class="lux-card overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-white/5 text-[9px] font-black text-slate-500 uppercase tracking-widest">
                    <tr><th class="p-8">Aspiration Details</th><th class="p-8">Status</th><th class="p-8">Staff Feedback</th><th id="thAksi" class="p-8 hidden">Action</th></tr>
                </thead>
                <tbody id="tabelBody" class="divide-y divide-white/5"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDrc8_w2ptm-hq-EShTZolqxDARSsz9Kbc", authDomain: "siam-kampus.firebaseapp.com", projectId: "siam-kampus", storageBucket: "siam-kampus.firebasestorage.app", messagingSenderId: "973898695715", appId: "1:973898695715:web:c7be91360a49928494dd96" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let myChart;

        onAuthStateChanged(auth, user => {
            if(!user || user.email.includes('student')) signOut(auth).then(() => window.location.href="index.html");
            else {
                const isAdmin = user.email === 'admin@umm.ac.id';
                document.getElementById('roleLabel').innerText = isAdmin ? "Administrator" : "Staff";
                if(isAdmin) document.getElementById('thAksi').classList.remove('hidden');
                initDashboard(isAdmin);
            }
        });

        function initDashboard(isAdmin) {
            onSnapshot(collection(db, "aspirasi"), snap => {
                const body = document.getElementById('tabelBody'); body.innerHTML = "";
                let stats = { Dikirim: 0, Diverifikasi: 0, Diproses: 0, Selesai: 0 };
                snap.forEach(d => {
                    const item = d.data();
                    stats[item.status]++;
                    body.innerHTML += `
                        <tr class="hover:bg-white/5 transition-all">
                            <td class="p-8 text-sm"><p class="font-bold mb-1">${item.deskripsi}</p><span class="text-[8px] font-black text-amber-400 bg-amber-400/10 px-2 py-1 rounded uppercase">${item.kategori}</span></td>
                            <td class="p-8"><select onchange="uData('${d.id}','status',this.value)" class="bg-slate-800 text-[9px] p-2 rounded-lg font-black uppercase text-amber-400">
                                <option value="Dikirim" ${item.status=='Dikirim'?'selected':''}>Dikirim</option>
                                <option value="Diverifikasi" ${item.status=='Diverifikasi'?'selected':''}>Diverifikasi</option>
                                <option value="Diproses" ${item.status=='Diproses'?'selected':''}>Diproses</option>
                                <option value="Selesai" ${item.status=='Selesai'?'selected':''}>Selesai</option>
                            </select></td>
                            <td class="p-8"><input onchange="uData('${d.id}','feedback_staff',this.value)" value="${item.feedback_staff || ''}" placeholder="Tulis feedback..." class="bg-white/5 p-3 rounded-xl text-[10px] w-full outline-none border border-transparent focus:border-amber-400"></td>
                            ${isAdmin ? `<td class="p-8"><button onclick="deleteDoc(doc(db,'aspirasi','${d.id}'))" class="text-red-500 text-[9px] font-black hover:underline">DELETE</button></td>` : ''}
                        </tr>`;
                });
                document.getElementById('totalCount').innerText = snap.size;
                updateChart(stats);
            });
        }

        window.uData = (id, f, v) => updateDoc(doc(db, "aspirasi", id), { [f]: v });
        window.searchAdmin = () => {
            const inp = document.getElementById("adminSearch").value.toLowerCase();
            const rows = document.getElementById("tabelBody").getElementsByTagName("tr");
            for(let i=0; i<rows.length; i++) {
                const txt = rows[i].getElementsByTagName("td")[0].innerText.toLowerCase();
                rows[i].style.display = txt.includes(inp) ? "" : "none";
            }
        };

        function updateChart(s) {
            if(myChart) myChart.destroy();
            myChart = new Chart(document.getElementById('statusChart').getContext('2d'), { type: 'bar', data: { labels: ['Dikirim', 'Diverifikasi', 'Diproses', 'Selesai'], datasets: [{ label: 'Statistik Aspirasi', data: [s.Dikirim, s.Diverifikasi, s.Diproses, s.Selesai], backgroundColor: '#fbbf24' }] }, options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } } } } });
        }
        document.getElementById('btnLogout').addEventListener('click', () => signOut(auth));
    </script>
</body>
</html>
